name: roadmiles
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  roadmiles:
    type: application
    platform: iOS
    sources: [roadmiles]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadmiles
        INFOPLIST_FILE: roadmiles/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: roadmiles/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Roadmap Miles
  roadmilesTests:
    type: bundle.unit-test
    platform: iOS
    sources: [roadmilesTests]
    dependencies:
      - target: roadmiles
  roadmilesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [roadmilesUITests]
    dependencies:
      - target: roadmiles
schemes:
  roadmiles:
    build:
      targets:
        roadmiles: all
    test:
      targets:
        - roadmilesTests
        - roadmilesUITests
